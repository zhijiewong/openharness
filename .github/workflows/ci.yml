name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npm test
        shell: bash

  build:
    needs: test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - run: |
          if [ "${{ needs.test.result }}" = "success" ]; then
            echo "All checks passed"
          else
            echo "One or more checks failed"
            exit 1
          fi
        shell: bash
